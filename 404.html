<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Перенаправление…</title>
    <script>
        // Получаем текущий путь из адресной строки
        var pathname = window.location.pathname;
        
        // Автоматически определяем имя вашего репозитория (в вашем случае это Fartify)
        var pathSegments = pathname.split('/').filter(Boolean);
        var repoName = pathSegments.length > 0 ? pathSegments[0] : '';
        
        // Убираем имя репозитория из пути, оставляя только внутренний роут (например, /Artist/Name)
        var routePath = pathname.replace('/' + repoName, '');
        
        // Перенаправляем на главную страницу репозитория, передавая путь через параметр ?path=
        window.location.replace('/' + repoName + '/?path=' + encodeURIComponent(routePath));
    </script>
</head>
<body>
    <p>Перенаправление...</p>
</body>
</html>
